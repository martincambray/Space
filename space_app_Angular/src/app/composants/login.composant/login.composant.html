<main class="login-page">
  <div class="login-card">
    <h1>Space Mission Control</h1>
    <p class="subtitle">Connexion</p>

    <form [formGroup]="loginForm" (ngSubmit)="connecter()">

      <div class="form-group">
        <label for="mail">Adresse e-mail</label>
        <input id="mail" type="email" formControlName="mail" placeholder="exemple@smc.fr" />
        @if (mailCtrl.invalid && mailCtrl.touched) {
          <span class="error">Adresse e-mail valide requise</span>
        }
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input id="password" type="password" formControlName="password" placeholder="••••••" />
        @if (passwordCtrl.invalid && passwordCtrl.touched) {
          <span class="error">Mot de passe requis (6 caractères minimum)</span>
        }
      </div>

      @if (loginError()) {
        <p class="login-error">Identifiants incorrects.</p>
      }

      <button type="submit" [disabled]="loginForm.invalid">Se connecter</button>

    </form>
  </div>
</main>
