<!DOCTYPE html>

<html lang="fr">

<head>
  <meta charset="utf-8"> <!-- encodage UTF-8 (accents, etc...) -->
  <title>SMC — Connexion</title>

  <!-- Import de la police Apple-like -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="login.css"> <!-- lien vers le CSS -->
</head>

<body>

  <!-- Titre principal -->
  <h1 class="main-title">
    Gestion de mission spatiale et simulation orbitale
  </h1>

  <!-- Conteneur du formulaire -->
  <div class="login-box">

    <!-- id="login-form" pour que le JS puisse intercepter -->
    <form id="login-form">

      <!-- Champ mail - name="mail" pour correspondre au futur champ attendu par AuthRequest côté API -->
      <div class="input-box">
        <input type="text" required name="mail" id="mail">
        <label>Email</label>
      </div>

      <!-- Champ Mot de passe idem ici -->
      <div class="input-box">
        <input type="password" required name="password" id="password">
        <label>Password</label>

        <!-- Bouton afficher / masquer -->
        <button type="button" id="togglePassword">👁️</button>
      </div>

      <!-- Message d'erreur (caché par défaut, affiché si login échoue) -->
      <p id="error-msg" style="color:#ff6b6b; text-align:center; display:none; margin-top:10px;">
        Identifiants incorrects.
      </p>

      <!-- Bouton login -->
      <button type="submit">Login</button>

    </form>

  </div>

  <script>
    const mailInput    = document.getElementById("mail");            // champ email
    const passwordInput = document.getElementById("password");        // champ password
    const loginButton  = document.querySelector('#login-form > button[type="submit"]'); // bouton login
    const toggleBtn    = document.getElementById("togglePassword");   // bouton oeil
    const errorMsg     = document.getElementById("error-msg");        // message d'erreur

    // On désactive le bouton au chargement
    loginButton.disabled = true;

    // On vérif si les champs sont remplis pour activer/désactiver le bouton
    function checkInputs() {
      loginButton.disabled = mailInput.value.trim() === "" || passwordInput.value.trim() === "";
    }

    mailInput.addEventListener("input", checkInputs);
    passwordInput.addEventListener("input", checkInputs);

    // Toggle show/mask le MDP
    toggleBtn.addEventListener("click", () => {
      if (passwordInput.type === "password") {
        passwordInput.type = "text";
        toggleBtn.textContent = "🫣"; // a changer par les icones
      } else {
        passwordInput.type = "password";
        toggleBtn.textContent = "👀"; // idem
      }
    });

    // Pour la soumission du formulaire à l'API rest
    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault(); // empêche le rechargement natif de la page

      errorMsg.style.display = "none"; // Pour cache un éventuel message d'erreur d'avant
      loginButton.disabled = true;     // Pour évite les doubles clics pendant la requête

      try {
        // Pour la méthode POST — envoie mail + password en JSON
        const response = await fetch("/api/auth", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            mail:     mailInput.value.trim(),
            password: passwordInput.value
          })
        });

        if (!response.ok) {
          // erreur 401 Unauthorized ou autre erreur : on affiche le message d'erreur
          errorMsg.style.display = "block";
          loginButton.disabled = false;
          return;
        }

        // L'API retourne { token: "[token]" }
        const data = await response.json();

        // On stocke le token JWT pour les futures requêtes
        localStorage.setItem("jwt", data.token);

        // On redirige vers la page principale
        window.location.href = "/menu/menu.html";

      } catch (err) {
        // Erreur réseau (serveur inaccessible, etc....)
        errorMsg.textContent = "Erreur de connexion au serveur.";
        errorMsg.style.display = "block";
        loginButton.disabled = false;
      }
    });
  </script>

</body>
</html>
