<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <title>Menu</title>

  <!-- meme police que pour lgin -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Bibliothèque d'icônes Boxicons à importer dans login pour correction-->
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

  <style>
    /* ================== RESET & FOND ================== */
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter', sans-serif; }
    body { background:#000; overflow:hidden; }

    .stars {
      position:absolute;                                          /* en dehors du flux, positionné par rapport au body */
      width:200%;
      height:200%;
      background:url("Assets/stardust.png");
      animation: moveStars 60s linear infinite;                   /* lent, en boucle infinie */
      z-index:0;
    }

    /* Déplacement diagonal */
    @keyframes moveStars {
      from { transform:translate(0,0); }
      to   { transform:translate(-500px,-500px); }
    }

    /* ===== SIDEBAR =====
       Panneau latéral : width:0 → invisible, passe à 220px avec .open */
    .sidebar {
      position:fixed;                                             /* fixée à gauche, indépendante du scroll */
      left:0; top:0;
      height:100%;
      width:0;                                                    /* cachée par défaut */
      overflow:hidden;                                            /* empêche le contenu de dépasser quand width=0 */
      background:rgba(255,255,255,0.08);                          /* verre dépoli */
      border-right:1px solid rgba(255,255,255,0.2);
      backdrop-filter:blur(15px);                                 /* flou du fond derrière la sidebar */
      transition:0.4s ease;                                       /* animation fluide à l'ouverture/fermeture */
      z-index:10;                                                 /* au-dessus du fond étoilé */
    }

    /* Classe ajoutée par JS pour ouvrir la sidebar */
    .sidebar.open { width:220px; }

    /* Items de navigation : sans puce de liste */
    .nav-list li { list-style:none; margin:15px; }

    /* Liens : flex pour aligner icône + texte horizontalement */
    .nav-list a {
      display:flex; align-items:center;
      color:white; text-decoration:none;
      padding:10px; border-radius:12px;
      transition:0.3s; /* fondu sur le hover */
    }

    /* Fond clair au survol d'un lien */
    .nav-list a:hover { background:rgba(255,255,255,0.2); }

    /* Texte du lien, espacé de l'icône */
    .links_name { margin-left:10px; }

    /* Sous-menu caché par défaut */
    .submenu { display:none; margin-left:30px; }

    /* Sous-menu visible quand le parent a la classe .open */
    .has-submenu.open .submenu { display:block; }

    /* Style du texte des sous-éléments */
    .submenu li a { font-size:0.9em; color:rgba(255,255,255,0.8); }

    /* Ligne de profil collée au bas de la sidebar */
    .profile-line {
      position:absolute; bottom:20px; left:20px;
      display:flex; align-items:center; gap:8px;
      color:white; font-size:1em; z-index:100;
    }
    .profile-line i { font-size:1.5em; } /* icône agrandie */

    /* ===== BOUTONS HAMBURGER (#btn) ET DÉCONNEXION (#logout-btn) =====
       Fixes à l'écran, se décalent à droite si la sidebar est ouverte */
    #btn, #logout-btn {
      position:fixed;
      font-size:30px; color:white; cursor:pointer;
      z-index:1000;       /* au-dessus de la simulation et de la toolbar */
      transition:0.4s ease;
    }
    #btn        { top:20px;    left:30px; }   /* hamburger en haut à gauche */
    #logout-btn { bottom:20px; left:30px; text-decoration:none; } /* logout en bas */

    /* Décalage des boutons quand la sidebar est ouverte */
    body.sidebar-open #btn,
    body.sidebar-open #logout-btn { left:250px; }

    /* ===== ÉCRAN DE SIMULATION =====
       Cadre centré avec lueur néon cyan */
    .simulation-screen {
      position:fixed;
      top:125px;              /* sous la toolbar */
      left:50%;               /* point de départ au centre */
      transform:translateX(-50%); /* compensation pour centrer parfaitement */
      width:1100px; height:600px;
      background:rgba(0,0,0,0.3);
      border:2px solid #00f0ff;
      border-radius:5px;
      box-shadow:0 0 10px #00f0ff, 0 0 20px #00f0ff, 0 0 40px #00f0ff; /* triple lueur */
      z-index:100;
      display:flex; align-items:center; justify-content:center;
      text-align:center; color:#00f0ff; font-size:1.2em;
    }

    /* ===== TOOLBAR =====
       Barre d'outils en haut, centrée horizontalement */
    .toolbar {
      position:fixed;
      top:20px;
      left:50%;
      transform:translateX(-50%); /* centrage parfait */
      display:flex; flex-direction:column; /* deux lignes de boutons */
      gap:10px;
      z-index:100;
      transition:0.4s ease; /* bouge si la sidebar s'ouvre */
    }

    /* La toolbar se décale si la sidebar est ouverte (moitié de sa largeur = 110px) */
    body.sidebar-open .toolbar { left:calc(50% + 110px); }

    /* Ligne horizontale de boutons */
    .toolbar-row { display:flex; gap:12px; }

    /* Style général d'un bouton toolbar */
    .tool-btn {
      background:rgba(0,150,255,0.2); /* bleu translucide */
      color:white;
      border:1px solid rgba(0,150,255,0.5);
      border-radius:5px;
      cursor:pointer; font-weight:500;
      text-shadow:0 0 3px rgba(255,255,255,0.8); /* halo blanc sur le texte */
      transition:all 0.3s ease;
    }

    /* Effet néon complet au hover */
    .tool-btn:hover {
      background:rgba(0,150,255,0.5);
      border-color:#00f0ff; color:#00f0ff;
      text-shadow:0 0 5px #fff,0 0 10px #0ff,0 0 20px #0ff;
      box-shadow:0 0 5px #00f0ff,0 0 10px #00f0ff,0 0 20px #00f0ff;
    }

    /* Tailles de boutons */
    .tool-btn-large  { padding:12px 24px; font-size:1.2em; }
    .tool-btn-medium { padding:10px 20px; font-size:1em;   }
    .tool-btn-small  { padding: 6px 12px; font-size:0.9em; }

    /* ===================================================
       POPUP MODALE — FOND (overlay)

       IMPORTANT : display:none → le popup est INVISIBLE par défaut.
       Le JS change cette valeur en "flex" lors du clic sur "Infos".
       position:fixed + z-index:2000 garantit qu'il passe
       DEVANT TOUT le reste (toolbar, simulation, sidebar…)
       =================================================== */
    .popup-overlay {
      position:fixed;          /* couvre tout l'écran quel que soit le scroll */
      top:0; left:0;
      width:100%; height:100%; /* 100% de l'écran */
      background:rgba(0,0,0,0.7);  /* assombrit le fond */
      backdrop-filter:blur(10px);  /* floute ce qui est derrière */
      display:none;            /* ← INVISIBLE PAR DÉFAUT — le JS passe à "flex" au clic */
      align-items:center;      /* centrage vertical (actif uniquement en flex) */
      justify-content:center;  /* centrage horizontal (actif uniquement en flex) */
      z-index:2000;            /* valeur très haute pour passer au-dessus de tout */
    }

    /* Boîte de dialogue de la popup */
    .popup-content {
      background:rgba(0,0,0,0.85); /* fond sombre presque opaque */
      border:2px solid #00f0ff;    /* bordure néon cyan */
      border-radius:10px;
      padding:30px;
      width:350px;                 /* largeur de la fenêtre modale */
      box-shadow:0 0 10px #00f0ff, 0 0 20px #00f0ff; /* lueur cyan */
      color:white;
    }

    /* Titre centré en cyan */
    .popup-content h2 {
      text-align:center;
      margin-bottom:20px;
      color:#00f0ff;
    }

    /* Labels des champs de formulaire */
    .popup-content label {
      display:block;
      margin-top:15px; margin-bottom:5px;
      font-size:0.9em;
    }

    /* Listes déroulantes stylisées dans le thème */
    .popup-content select {
      width:100%; padding:8px;
      background:rgba(0,150,255,0.1); /* bleu translucide */
      color:white;
      border:1px solid rgba(0,150,255,0.5);
      border-radius:5px;
      outline:none; /* retire le focus natif du navigateur */
    }

    /* Zone boutons : Valider à gauche, Annuler à droite */
    .popup-actions {
      display:flex;
      justify-content:space-between;
      margin-top:20px;
    }

    /* Champs texte et datetime dans le popup (même style que les selects) */
    .popup-content input[type="text"],
    .popup-content input[type="datetime-local"] {
      width:100%; padding:8px;
      background:rgba(0,150,255,0.1);
      color:white;
      border:1px solid rgba(0,150,255,0.5);
      border-radius:5px;
      outline:none;
      font-family:'Inter', sans-serif;
      font-size:1em;
    }

    /* Correction couleur placeholder (blanc translucide pour rester lisible sur fond sombre) */
    .popup-content input::placeholder { color:rgba(255,255,255,0.4); }

    /* Icône du calendrier datetime-local : forcer blanc */
    .popup-content input[type="datetime-local"]::-webkit-calendar-picker-indicator {
      filter:invert(1);
    }

    /* Message d'erreur du popup */
    #popup-error {
      color:#ff6b6b;
      font-size:0.85em;
      text-align:center;
      display:none;
      margin-top:10px;
    }
  </style>
</head>

<body>

  <!-- ===== SIDEBAR =====
       Panneau gauche : invisible (width:0) jusqu'au clic sur #btn -->
  <div class="sidebar">
    <div class="logo-details">
      <div class="logo_name">Menu</div> <!-- Titre du menu -->
    </div>

    <ul class="nav-list">
      <!-- Lien Accueil -->
      <li><a href="#"><i class='bx bx-grid-alt'></i><span class="links_name">Accueil</span></a></li>

      <!-- Lien Profil -->
      <li><a href="#"><i class='bx bx-user'></i><span class="links_name">Profil</span></a></li>

      <!-- Item avec sous-menu : le clic JS toggle la classe .open -->
      <li class="has-submenu">
        <a href="#"><i class='bx bx-rocket'></i><span class="links_name">Missions</span></a>
        <ul class="submenu"> <!-- Sous-menu caché par défaut -->
          <li><a href="#">Mission en cours</a></li>
          <li><a href="#">Historique</a></li>
          <li><a href="#">Planifier</a></li>
        </ul>
      </li>

      <!-- Lien Request -->
      <li><a href="#"><i class='bx bx-cog'></i><span class="links_name">Request</span></a></li>
    </ul>

    <!-- Profil utilisateur en bas de la sidebar -->
    <div class="profile-line">
      <i class='bx bx-user-circle'></i>
      <span class="profile-text">Martin : Role</span>
    </div>
  </div>

  <!-- ===== BOUTON HAMBURGER (☰) =====
       Clic → ouvre/ferme la sidebar via JS -->
  <i class='bx bx-menu' id="btn"></i>

  <!-- ===== BOUTON DÉCONNEXION =====
       Redirige vers la page de login -->
  <!-- href="#" évite une navigation involontaire — le JS gère la déconnexion -->
  <a href="#" id="logout-btn"><i class='bx bx-log-out'></i></a>

  <!-- ===== TOOLBAR =====
       Deux rangées de boutons de contrôle de la simulation -->
  <div class="toolbar">

    <!-- Rangée 1 : actions principales -->
    <div class="toolbar-row">
      <button class="tool-btn tool-btn-large"  id="btn-start">Lancer</button>   <!-- lance la simulation -->
      <button class="tool-btn tool-btn-large"  id="btn-reset">Reset</button>    <!-- remet les angles à 0 -->
      <button class="tool-btn tool-btn-medium" id="btn-pause">Pause</button>    <!-- met en pause / reprend -->
    </div>

    <!-- Rangée 2 : contrôles secondaires -->
    <div class="toolbar-row">
      <button class="tool-btn tool-btn-small" id="btn-zoom-in" >Zoom +</button> <!-- zoom avant -->
      <button class="tool-btn tool-btn-small" id="btn-zoom-out">Zoom -</button> <!-- zoom arrière -->
      <button class="tool-btn tool-btn-small" id="btn-test"    >Infos</button>  <!-- ← ouvre le popup -->
    </div>
  </div>

  <!-- ===== ÉCRAN DE SIMULATION =====
       Canvas sur lequel le système solaire est dessiné -->
  <div class="simulation-screen">
    <canvas id="solar-system-canvas" width="1080" height="580"></canvas>
  </div>

  <!-- ===== FOND ÉTOILÉ =====
       Placé APRÈS les éléments principaux pour rester en dessous (z-index:0) -->
  <div class="stars"></div>


  <!-- ===================================================
       POPUP MODALE — MISSION
       DOIT être placée DANS <body> pour que le z-index
       et le centrage fixed fonctionnent correctement.

       display:none (CSS) → invisible par défaut.
       JS passe à display:flex au clic sur "Infos".
       =================================================== -->
  <div id="mission-popup" class="popup-overlay">

    <!-- Boîte de dialogue centrée (flex center du parent) -->
    <div class="popup-content">

      <!-- Titre de la modale -->
      <h2>Configurer une mission</h2>

      <!-- Formulaire de configuration de mission — champs calés sur CreateMissionRequest -->
      <form id="mission-form">

        <!-- Nom de la mission (obligatoire) -->
        <label>Nom de la mission</label>
        <input type="text" name="name" required placeholder="Ex : Mission Mars Alpha">

        <!-- Spacecraft (chargé depuis GET /api/spacecraft) -->
        <label>Spacecraft</label>
        <select name="spacecraftId" required>
          <option value="">-- chargement... --</option>
        </select>

        <!-- Type de mission (chargé depuis GET /api/missiontype) -->
        <label>Type de mission</label>
        <select name="typeId" required>
          <option value="">-- chargement... --</option>
        </select>

        <!-- Corps de départ (chargé depuis GET /api/celestialbody) -->
        <label>Corps de départ</label>
        <select name="departureBodyId" required>
          <option value="">-- chargement... --</option>
        </select>

        <!-- Corps d'arrivée (chargé depuis GET /api/celestialbody) -->
        <label>Corps d'arrivée</label>
        <select name="arrivalBodyId" required>
          <option value="">-- chargement... --</option>
        </select>

        <!-- Date de départ (obligatoire) -->
        <label>Date de départ</label>
        <input type="datetime-local" name="departureDate" required>

        <!-- Message d'erreur affiché si l'API répond en erreur -->
        <p id="popup-error">Erreur lors de la création de la mission.</p>

        <!-- Boutons de validation et d'annulation -->
        <div class="popup-actions">
          <button type="submit"  class="tool-btn tool-btn-medium">Valider</button>
          <button type="button"  id="cancel-popup" class="tool-btn tool-btn-medium">Annuler</button>
        </div>

      </form>
    </div>
  </div>
  <!-- ===== FIN POPUP ===== -->


  <!-- ===================================================
       JAVASCRIPT
       Tout le code est dans DOMContentLoaded pour garantir
       que tous les éléments HTML existent avant de les cibler
       =================================================== -->
  <script>
    document.addEventListener("DOMContentLoaded", function () {

      /* ===================================================
         GARDE JWT — redirige vers login si aucun token
         =================================================== */
      const jwt = localStorage.getItem("jwt");
      if (!jwt) {
        window.location.href = "/login/login.html";
        return; // stoppe l'exécution du reste du script
      }

      /* Décode la partie "payload" du JWT (base64) pour lire mail + rôle
         Un JWT est composé de 3 parties séparées par des points : header.payload.signature
         Seul le payload nous intéresse ici (index 1) */
      function decodeJwt(token) {
        try {
          const payload = token.split(".")[1];         // isole la partie payload
          return JSON.parse(atob(payload));             // décode base64 puis parse JSON
        } catch (e) {
          return {};
        }
      }

      /* Affiche le nom de l'utilisateur dans la sidebar (sujet du JWT = mail) */
      const claims = decodeJwt(jwt);
      const profileText = document.querySelector(".profile-text");
      if (profileText && claims.sub) {
        profileText.textContent = claims.sub; // affiche le mail de l'utilisateur connecté
      }

      /* Helper : construit les headers HTTP avec le token JWT
         Toutes les requêtes vers l'API (sauf /api/auth) nécessitent ce header */
      function authHeaders() {
        return {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + jwt  // format attendu par JwtHeaderFilter
        };
      }

      /* ===== SIDEBAR ===== */
      const sidebar  = document.querySelector(".sidebar");     // sélectionne la sidebar
      const btn      = document.querySelector("#btn");         // bouton hamburger
      const missions = document.querySelector(".has-submenu"); // item avec sous-menu

      // Clic sur hamburger : toggle sidebar + classe sur body pour décaler la toolbar
      btn.addEventListener("click", () => {
        sidebar.classList.toggle("open");              // ouvre ou ferme la sidebar
        document.body.classList.toggle("sidebar-open"); // décale toolbar et boutons
      });

      // Clic sur "Missions" : toggle le sous-menu
      missions.addEventListener("click", () => {
        missions.classList.toggle("open"); // affiche ou masque le sous-menu
      });


      /* ===== CANVAS & SYSTÈME SOLAIRE ===== */
      const canvas  = document.getElementById('solar-system-canvas'); // canvas HTML
      const ctx     = canvas.getContext('2d');   // contexte de dessin 2D
      const width   = canvas.width;             // largeur du canvas (1080px)
      const height  = canvas.height;            // hauteur du canvas (580px)
      const centerX = width  / 2;              // centre horizontal
      const centerY = height / 2;              // centre vertical

      // Configuration du Soleil
      const sun = { radius:50, color:'yellow', glow:true };

      // Palette de couleurs des planètes (simulant les textures)
      const planetTextures = {
        Mercure:'#a9a9a9', Venus:'#eedd82', Terre:'#4d9fff', Mars:'#ff4500',
        Jupiter:'#d2b48c', Saturne:'#f5deb3', Uranus:'#afeeee', Neptune:'#4169e1'
      };

      // Données de chaque planète : nom, rayon (px), distance au soleil, vitesse angulaire, angle initial, couleur
      const planets = [
        {name:'Mercure', radius: 5, distance: 60,  speed:0.047, angle:0, color:planetTextures.Mercure},
        {name:'Vénus',   radius:12, distance: 90,  speed:0.035, angle:0, color:planetTextures.Venus},
        {name:'Terre',   radius:13, distance:120,  speed:0.030, angle:0, color:planetTextures.Terre},
        {name:'Mars',    radius:10, distance:150,  speed:0.024, angle:0, color:planetTextures.Mars},
        {name:'Jupiter', radius:25, distance:200,  speed:0.013, angle:0, color:planetTextures.Jupiter},
        {name:'Saturne', radius:22, distance:250,  speed:0.009, angle:0, color:planetTextures.Saturne,  ring:true}, // a des anneaux
        {name:'Uranus',  radius:18, distance:300,  speed:0.006, angle:0, color:planetTextures.Uranus,   ring:true}, // a des anneaux
        {name:'Neptune', radius:18, distance:350,  speed:0.005, angle:0, color:planetTextures.Neptune}
      ];

      let animationId;         // identifiant de la frame courante (pour annuler)
      let paused    = false;   // état pause / lecture
      let zoomFactor = 1;      // facteur d'échelle des orbites

      /* Dessine une planète (ou le Soleil) avec dégradé radial simulant un éclairage 3D */
      function drawPlanet(x, y, radius, color, glow = false) {
        const gradient = ctx.createRadialGradient(
          x - radius/3, y - radius/3, radius/5, // source lumineuse décalée (effet 3D)
          x, y, radius                           // bord externe de la planète
        );
        gradient.addColorStop(0, 'white'); // centre lumineux
        gradient.addColorStop(0.2, color); // couleur de la planète
        gradient.addColorStop(1, 'black'); // bord dans l'ombre

        ctx.beginPath();
        ctx.arc(x, y, radius, 0, 2 * Math.PI); // cercle de la planète
        ctx.fillStyle = gradient;
        ctx.fill();

        // Lueur (uniquement pour le Soleil)
        ctx.shadowBlur  = glow ? 30 : 0;
        ctx.shadowColor = glow ? color : '';
      }

      /* Dessine les anneaux de Saturne / Uranus (ellipse aplatie) */
      function drawRing(x, y, innerR, outerR) {
        ctx.beginPath();
        ctx.strokeStyle = 'rgba(255,255,255,0.2)'; // anneau translucide
        ctx.lineWidth   = outerR - innerR;          // épaisseur = différence des rayons
        ctx.arc(x, y, (outerR + innerR) / 2, 0, 2 * Math.PI); // arc au rayon moyen
        ctx.stroke();
      }

      /* Dessine le cercle d'orbite d'une planète */
      function drawOrbit(distance) {
        ctx.beginPath();
        ctx.strokeStyle = 'rgba(255,255,255,0.1)'; // très discret
        ctx.lineWidth   = 1;
        ctx.arc(centerX, centerY, distance * zoomFactor, 0, 2 * Math.PI);
        ctx.stroke();
      }

      /* Boucle d'animation principale */
      function draw() {
        ctx.clearRect(0, 0, width, height); // efface le frame précédent

        drawPlanet(centerX, centerY, sun.radius, sun.color, true); // dessine le Soleil

        planets.forEach(p => drawOrbit(p.distance)); // dessine toutes les orbites

        planets.forEach(planet => {
          if (!paused) planet.angle += planet.speed; // avance l'angle si non pausé

          // Calcul des coordonnées en coordonnées polaires → cartésiennes
          const x = centerX + planet.distance * zoomFactor * Math.cos(planet.angle);
          const y = centerY + planet.distance * zoomFactor * Math.sin(planet.angle);

          drawPlanet(x, y, planet.radius, planet.color); // dessine la planète

          // Si la planète a des anneaux, on les ajoute
          if (planet.ring) drawRing(x, y, planet.radius + 2, planet.radius + 8);
        });

        animationId = requestAnimationFrame(draw); // planifie la prochaine frame
      }

      draw(); // lance l'animation au chargement


      /* ===== CONTRÔLES DE LA TOOLBAR ===== */

      // Pause : inverse l'état (true ↔ false)
      document.getElementById('btn-pause').addEventListener('click', () => {
        paused = !paused;
      });

      // Reset : replace toutes les planètes à leur position initiale (angle=0)
      document.getElementById('btn-reset').addEventListener('click', () => {
        planets.forEach(p => p.angle = 0);
      });

      // Zoom + : augmente le facteur d'échelle de 10%
      document.getElementById('btn-zoom-in').addEventListener('click', () => {
        zoomFactor *= 1.1;
      });

      // Zoom - : diminue le facteur d'échelle de 10%
      document.getElementById('btn-zoom-out').addEventListener('click', () => {
        zoomFactor /= 1.1;
      });

      // Lancer : reprend la simulation si elle était en pause
      document.getElementById('btn-start').addEventListener('click', () => {
        paused = false;
      });


      /* ===================================================
         CHARGEMENT DES LISTES DEPUIS L'API
         Peuple les <select> du popup au chargement de la page
         =================================================== */

      /* Remplit un <select> avec des options id/name venant de l'API */
      async function populateSelect(selectName, url) {
        try {
          const response = await fetch(url, { headers: authHeaders() });
          if (!response.ok) return;

          const items = await response.json();
          const select = document.querySelector(`select[name="${selectName}"]`);
          select.innerHTML = '<option value="">-- choisir --</option>'; // option vide par défaut

          items.forEach(item => {
            const option = document.createElement("option");
            option.value       = item.id;   // id envoyé à l'API
            option.textContent = item.name; // nom affiché à l'utilisateur
            select.appendChild(option);
          });
        } catch (e) {
          console.error("Erreur chargement liste :", url, e);
        }
      }

      /* Chargement parallèle des 3 listes au démarrage */
      Promise.all([
        populateSelect("spacecraftId",    "/api/spacecraft"),
        populateSelect("typeId",          "/api/mission-type"),
        populateSelect("departureBodyId", "/api/celestial-body"),
        populateSelect("arrivalBodyId",   "/api/celestial-body")
      ]);


      /* ===================================================
         GESTION DU POPUP
         =================================================== */

      const popup      = document.getElementById("mission-popup"); // l'overlay complet
      const openBtn    = document.getElementById("btn-test");       // bouton "Infos"
      const cancelBtn  = document.getElementById("cancel-popup");   // bouton "Annuler"
      const form       = document.getElementById("mission-form");   // formulaire interne
      const popupError = document.getElementById("popup-error");    // message d'erreur

      /* Ouvrir le popup */
      openBtn.addEventListener("click", () => {
        popupError.style.display = "none"; // cache une erreur précédente
        popup.style.display = "flex";
      });

      /* Fermer le popup via "Annuler" */
      cancelBtn.addEventListener("click", () => {
        popup.style.display = "none";
      });

      /* Fermer le popup au clic sur le fond sombre */
      popup.addEventListener("click", (e) => {
        if (e.target === popup) popup.style.display = "none";
      });

      /* Soumission du formulaire : appel POST /api/mission avec JWT */
      form.addEventListener("submit", async (e) => {
        e.preventDefault(); // empêche le rechargement natif de la page

        popupError.style.display = "none";

        // Construction de l'objet JSON attendu par CreateMissionRequest
        const body = {
          name:            form.name.value.trim(),
          spacecraftId:    parseInt(form.spacecraftId.value),
          typeId:          parseInt(form.typeId.value),
          departureBodyId: parseInt(form.departureBodyId.value),
          arrivalBodyId:   parseInt(form.arrivalBodyId.value),
          departureDate:   form.departureDate.value  // format ISO : "2026-06-01T08:00"
        };

        try {
          const response = await fetch("/api/mission", {
            method:  "POST",
            headers: authHeaders(),   // Content-Type + Authorization Bearer
            body:    JSON.stringify(body)
          });

          if (!response.ok) {
            popupError.style.display = "block";
            return;
          }

          const missionId = await response.json(); // l'API retourne l'id créé
          console.log("Mission créée, id :", missionId);
          form.reset();              // vide le formulaire
          popup.style.display = "none"; // ferme le popup
        } catch (err) {
          popupError.textContent = "Erreur réseau lors de la création.";
          popupError.style.display = "block";
        }
      });


      /* ===================================================
         DÉCONNEXION — efface le JWT et redirige vers login
         =================================================== */
      document.getElementById("logout-btn").addEventListener("click", (e) => {
        e.preventDefault();
        localStorage.removeItem("jwt"); // supprime le token
        window.location.href = "/login/login.html";
      });

    }); // fin DOMContentLoaded
  </script>

</body>
</html>
