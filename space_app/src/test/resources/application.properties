# Base H2 en mémoire — les tests ne dépendent pas du serveur MySQL partagé
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate crée les tables depuis les @Entity puis les supprime après les tests
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# Désactive l'exécution de data.sql (pas nécessaire pour les tests, évite les conflits H2/MySQL)
spring.sql.init.mode=never

# Clé JWT dédiée aux tests (ne pas utiliser en production)
jwt.secret=TestSecretKeyForJwtSigningInTestsOnly1234567890abcd
